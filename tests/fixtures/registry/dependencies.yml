# FS-GG cross-repo contract & dependency registry.
# The machine-readable source of truth for who depends on whom and which contract
# versions are coherent. A `contract-change` issue MUST update this file as part of
# its resolution. Human projection: docs/registry/compatibility.md.
schemaVersion: 1
updated: "2026-06-28"   # .github#49 typed-CLI gate swap ATTEMPTED + RE-BLOCKED (owner github): wiring contract-coherence.yml onto the typed `fsgg-sdd registry validate` is now POSSIBLE (SDD#31 closed — FS.GG.SDD.Cli 0.2.0 is published + PUBLIC on the org feed; SDD#27 closed — Contracts 1.1.0 published) but on first real wiring the typed validator FAILS the valid registry: `fsgg-sdd registry validate` exits 1 with MalformedVersion on governance-reference-gate-set's 4-segment `version`/`package-version` `1.2.1.1` (ADR-0007 derives it from 4 schemaVersions), which the Python stand-in accepts (its regex permits the optional 4th segment). Fsgg.Registry's grammar does not accept 4-segment NuGet/System.Version, so SDD#26's "rule kinds mirror validate-registry.py" is INCOMPLETE. Swapping as-is would red contract-coherence on every FS-GG repo (registry valid, validator wrong), so the gate STAYS on validate-registry.py and registry-validator-typed STAYS coherent:false. Filed SDD#32 (fix 4-segment grammar + republish CLI) — .github#49 re-blocked on it. No surface/version/coherence change — gate behavior unchanged. fsgg-contracts package-version 1.0.1→1.1.0 (owner sdd): FS.GG.Contracts 1.1.0 is now LIVE on the org GitHub Packages feed (SDD#27 / feature 043, release.yml dispatch version=1.1.0, run 28334268175 "Your package was pushed"; feed serves 1.1.0 + 1.0.1), closing the release lag #42 left open. This advances `package-version` 1.0.1→1.1.0 to match the already-1.1.0 `version`, so package-version == version == feed(newest) == SDD source == 1.1.0 and the contract-coherence pin assertion is fully coherent. No surface/contract change, no coherence flip (registry-validator-typed still funnels its step (2) — switch .github#18 to the typed CLI — through .github#49; this entry resolves only step (1)'s downstream pin). Resolves .github#47. #15: register governance-reference-gate-set@1.2.1.1 (H3, epic #16 Pillar 3) — Governance publishes the validated reference .fsgg gate set as the content-only NuGet package FS.GG.Governance.ReferenceGateSet (packs the four samples/sdd-reference-gate-set/.fsgg/ files in place, byte-identical, no assembly/no deps), version DERIVED from the contained schemaVersions ({gov}.{caps}.{policy}.{tooling}=1.2.1.1; ADR-0007 Accepted), GATED on the G1–G7 guard so shipped==tested. New consumer edge templates→governance via the package; new coherence id reference-gate-set-published (coherent:false — standing request for the Templates#14 overlay drift-gate consumer; org-feed push deferred .github#21). Unblocks Templates#14. registry-validator-typed CONVERGENCE recorded (owner sdd): SDD#12 RESOLVED/CLOSED by SDD#26 (merged) — Fsgg.Registry now types + validates THIS file (RegistryDocument + validateDocument w/ rule kinds mirroring validate-registry.py + RegistryDocument.load YAML edge + `fsgg-sdd registry validate` CLI), shipped in FS.GG.Contracts 1.1.0. The "no loader / abstract model diverges" gap is CLOSED. STAYS coherent:false pending two coupled steps, both funneling through SDD#27: (1) publish 1.1.0 to the org feed (source 1.1.0, package-version still 1.0.1); (2) switch .github#18 contract-coherence.yml from the Python stand-in to the typed CLI. Prose-only registry maintenance — no coherence flip, no surface/version change. Board reconciled + epic #16 STARTED (owner github): epic FS-GG/.github#16 (Homogeneous build · contracts · auto-update fabric, multi-repo) given a Start date 2026-06-28 on the Coordination board — it was already In progress but the timeline Start field was empty (so it never anchored on the Roadmap). Board↔issue drift fixed: FS-GG/.github#22 (H4 dispatch-sender + org Renovate preset, Pillar 4) moved Done→In review — its provisioning blocker #21 (org GitHub App + Packages feed + dispatch/feed secrets) is CLOSED and both fabric halves are merged (#34/#37/#38), so Done overstated it and it is no longer blocked; the issue stays OPEN pending the FIRST green FS.GG.* Renovate sweep (the single remaining gate on coherence id cross-repo-auto-update). No registry surface/contract/version change — board-state reconciliation only. #20 RESOLVED → apicompat-publicapi-gate coherent:true (owner github): both contract-package repos ratcheted the public-API breaking-change gate advisory→ENFORCING via a dedicated api-compatibility-gate CI job (run fails on a real CP#### break) — FS.GG.Rendering over the 17 FS.GG.UI.* packables vs 0.1.52-preview.1 (Rendering#22 adopt + #25 ratchet), FS.GG.SDD over FS.GG.Contracts vs 1.0.1 (SDD#28 adopt + #29 ratchet). F#-correct (SDK Package Validation/ApiCompat, not PublicApiAnalyzers); detector fails only on genuine breaks (NoBaselineYet/Indeterminate never fail); workflow-level enforcement (no branch protection — same model as lockfile-restore-enforcement). Governance keeps its own spec-088 maturity track. #20 closed. SDD#17 RESOLVED (owner sdd): FS.GG.Contracts 1.0.1 PUBLISHED to the org GitHub Packages feed (nuget.pkg.github.com/FS-GG) via SDD release v1.0.1 (release.yml producer half, feature 039; run push step verified — "Your package was pushed"), closing the empty-feed gap. The feed is now FULLY POPULATED — FS.GG.Rendering's release (fs-gg-ui-template/v0.1.52-preview.1) also pushed FS.GG.UI.Template + the full FS.GG.UI.* set, so 19 FS.GG.* packages resolve and the feed-presence blocker is RESOLVED (supersedes the historical "feed is EMPTY" note further below). cross-repo-auto-update STAYS coherent:false for ONE remaining reason — no green FS.GG.* Renovate sweep has run yet (only third-party Renovate PRs observed); it flips coherent:true on the first. fsgg-contracts pin 1.0.1→1.1.0 (owner sdd): SDD#26 (feature 042) advanced the FS.GG.Contracts source version to 1.1.0 (additive — typed registry validator over the real dependencies.yml) but did not update this registry (contract-change protocol) or publish, so the contract-coherence gate went red (registry 1.0.1 != SDD source 1.1.0). This advances `version` to 1.1.0 to track the source authority; `package-version` stays 1.0.1 (last published — 1.1.0 not yet on the feed, release lag; SDD to publish via SDD#17). #20 coherence note (owner github): apicompat-publicapi-gate updated — mechanism correction (PublicApiAnalyzers is a Roslyn/C# analyzer, does NOT analyze F#; for the F# packables the operative detector is the SDK ApiCompat/Package Validation at the I/O edge — no new dependency in the pure leaves; .fsi + surface/*.surface.txt stay the source record) + consumer adoption recorded. Feed-status CORRECTION: the org GitHub Packages feed is now POPULATED (FS.GG.Contracts 1.0.1 + FS.GG.UI.* 0.1.52-preview.1), so baselines EXIST for the SDD/Rendering packables and the H4-feed coupling is resolved for them (only FS.GG.Governance.* stay unpublished → NoBaselineYet). FS.GG.Governance landed its advisory gate (spec 088: ReleaseRuleKind.ApiCompatibility + pack-and-apicheck.fsx over 71 IsPackable, advisory continue-on-error job); FS.GG.Rendering adopts the gate on the 17 FS.GG.UI.* packables vs the 0.1.52-preview.1 baseline. Still coherent:false (per-repo adoption + ratchet to required pending). No contract surface/version change. fsgg-contracts pin 1.0.0→1.0.1 (owner sdd): Governance-owned `capabilities` schemaVersion corrected 1→2, package republished (SDD#18 / feature 040, merged SDD#22). auto-update fabric VERIFIED end-to-end (dispatch smoke-tested; Renovate installed+resolving preset; read:packages feed-auth HTTP 200) but the org GitHub Packages feed is EMPTY — FS.GG.* was never published there so every lookup is no-result; producer publish steps now the blocker: FS.GG.Rendering#15 (release-time pack+push, MERGED) + FS.GG.SDD#17 (FS.GG.Contracts, filed); feed hostRules token moved out of the shared preset into each repo's own renovate.json (Renovate won't substitute {{secrets}} in an `extends` preset). #22: cross-repo auto-update fabric authored (H4, epic #16 Pillar 4) — reusable dispatch-sender workflow (.github/workflows/dispatch-sender.yml, workflow_call; App-token repository_dispatch, since GITHUB_TOKEN can't dispatch cross-repo) + org-shared Renovate preset (default.json, `extends: github>FS-GG/.github`) with custom managers for every embedded pin the nuget manager misses (FsGgUiVersion->FS.GG.UI.Template + annotation-driven gate-set) on the org GitHub Packages feed. New coherence id cross-repo-auto-update (coherent:false) — DORMANT/fail-closed until org-admin provisions the App + feed (#21). No contract surface/version change. #20: api-breaking-change-gate carried by shared-build-config (H3, epic #16 Pillar 5) — PublicApiAnalyzers (centrally pinned 3.3.4) + SDK Package Validation/ApiCompat wired into dist/dotnet as an OPT-IN, advisory-by-default gate (FsggApiGate); off by default so a plain re-sync stays non-breaking under locked restore (enabling it adds a PackageReference → the adopting repo regenerates its lockfile). New coherence id apicompat-publicapi-gate (coherent:false) tracks per-repo adoption on FS.GG.Contracts + FS.GG.UI.*. #18: reusable contract-coherence gate landed (H3, epic #16 Pillar 3) — .github/workflows/contract-coherence.yml (workflow_call) + scripts/validate-registry.py; validates this registry's schema, asserts the declared fsgg-contracts pin == the actual FS.GG.Contracts package version (FS.GG.SDD), and runs sync-build-config.sh --check for build-config drift; .github gained its first workflows (coherence.yml self-gate). New coherence id registry-validator-typed (coherent:false) tracks converging Fsgg.Registry onto the real registry schema (FS.GG.SDD#12). #29: shared-build-config defect fix — XML-invalid comment (`--` inside <!-- -->) in dist/dotnet/Directory.Build.props broke every adopter's build (MSB4024); reworded + sync-build-config.sh now asserts source .props well-formedness (surface unchanged, no version bump); #27: register fsgg-contracts@1.0.0 (H2, epic #16 Pillar 2 — typed coherence backbone; SDD#8); #19: ADR-0006 shared-build-config contract + lockfile-restore-enforcement gate unified to GITHUB_ACTIONS (.github source of truth); #17: ADR-0005 .fsgg slot ownership (SDD project.yml / Governance governance.yml; canonical scaffold param `name`); #14: governance-overlay-populated coherent; #7: lockfile-restore-enforcement coherent

repos:
  sdd:        { name: FS.GG.SDD,        role: "spec-driven lifecycle CLI + contracts" }
  rendering:  { name: FS.GG.Rendering,  role: "Skia/OpenGL + Elmish UI framework + fs-gg-ui template" }
  governance: { name: FS.GG.Governance, role: "optional rule/evidence/gate tooling" }
  templates:  { name: FS.GG.Templates,  role: "downstream composition (fs-gg-fullstack, providers, overlays)" }

# Versioned contracts and where they are owned/consumed.
contracts:
  - id: scaffold-provider
    version: "1.0.0"
    owner: sdd
    surface: ".fsgg/providers.yml + provider invocation protocol (dotnet new wrapper)"
    consumers: [templates, rendering]   # rendering authors a provider descriptor; templates registers one
    # ADR-0005: the canonical product-name parameter is `name` (was `productName`); invocation passes --param name=<product>.
    parameters:
      name:
        type: "string (product name)"
        notes: "Canonical scaffold product-name param. Supersedes the drifted `productName` spelling (ADR-0005)."
  - id: fsgg-contracts
    version: "1.1.0"            # FS.GG.Contracts contract/source SemVer — the authority is FS.GG.SDD (fsproj <Version> == Fsgg.ContractVersion.value). 1.1.0: additive typed registry validator over the real dependencies.yml (SDD#26 / feature 042). Tracks source; the contract-coherence gate asserts this == SDD's actual version.
    package-version: "1.1.0"    # PUBLISHED package on the org feed (nuget.pkg.github.com/FS-GG) — 1.1.0 is now live (SDD release.yml dispatch version=1.1.0, run 28334268175; feed serves 1.1.0 + 1.0.1). package-version == version == feed(newest) == SDD source == 1.1.0, so the contract-coherence pin assertion is fully coherent and the release lag is CLOSED (SDD#27 / .github#47).
    owner: sdd
    # H2 (epic #16, Pillar 2): the typed coherence backbone. A BCL-only F# leaf library
    # (FSharp.Core-only closure, no project references) that owns the machine-readable form of
    # every other .fsgg contract id's schema + version constants. Published to a local folder feed
    # until the H4 feed exists (SDD#8). Implemented & in review; consumers re-type onto it next:
    # SDD#9, Governance#14, Templates#13.
    surface: >
      FS.GG.Contracts package — Fsgg.Schemas (typed .fsgg schema records + version constants for
      providers/project/sdd/agents/governance/policy/capabilities/tooling/scaffold-provenance/
      governance-handoff) / Fsgg.Provider (extended ProviderDescriptor + optional Build/Test/Run/Verify
      commands + canonical NameParameter default "name") / Fsgg.Registry (dependencies.yml types +
      validator; 1.1.0 adds the typed registry validator over the real dependencies.yml, SDD#26 /
      feature 042 — additive) / Fsgg.ContractVersion (= 1.1.0).
    consumers: [sdd, governance, templates]   # re-type tracked: SDD#9 / Governance#14 / Templates#13
    notes: >
      The reusable contract-coherence workflow (#18, LANDED) asserts this registry's declared
      fsgg-contracts version equals the ACTUAL FS.GG.Contracts package version (read from FS.GG.SDD,
      the schema authority) and fails on drift. Source advanced 1.0.1 → 1.1.0 in SDD#26 (feature 042,
      additive typed registry validator); this entry tracks that source version. RELEASE LAG CLOSED
      (2026-06-28): 1.1.0 is now PUBLISHED on the org feed (SDD#27 / feature 043, release.yml dispatch
      version=1.1.0, run 28334268175 "Your package was pushed"; feed serves 1.1.0 + 1.0.1), so
      package-version advanced 1.0.1 → 1.1.0 (this entry) and consumers now resolve 1.1.0 —
      package-version == version == feed(newest) == SDD source == 1.1.0. Registry-schema validation currently
      runs through a stand-in (scripts/validate-registry.py) that mirrors Fsgg.Registry's rule kinds,
      because Fsgg.Registry has no YAML loader and its abstract model/version-grammar diverge from
      this file (coherence id registry-validator-typed; FS.GG.SDD#12). The apicompat gate (#20) guards
      FS.GG.Contracts' public surface (SDK Package Validation/ApiCompat — the F#-viable detector).
      Feed/visibility (2026-06-28): FS.GG.Contracts is PUBLISHED on the org GitHub Packages NuGet
      feed (1.1.0 newest, 1.0.1 retained) and its visibility was changed private→PUBLIC so consumer-repo
      CI restores it with the run-scoped GITHUB_TOKEN (permissions: packages: read) — no PAT or
      per-repo Actions secret. GitHub Packages NuGet still requires a token even for public
      packages (anonymous restore 401s), so the feed credential stays wired to GITHUB_TOKEN.
      Consumer re-type Governance#14 is DONE (FS.GG.Governance PR #24, merged); SDD#9 / Templates#13
      remain. Adopters add a repo-root nuget.config (fsgg-github + packageSourceMapping FS.GG.*),
      which changes FSharp.Core's resolved lockfile contentHash vs a no-config repo — regenerate
      lockfiles under that config (--force-evaluate) or locked restore fails NU1403.
  - id: scaffold-provenance
    version: "1.0.0"
    owner: sdd
    surface: ".fsgg/scaffold-provenance.json"
    consumers: [sdd]
  - id: governance-handoff
    version: "1.0.0"
    range: "1.x"
    owner: sdd
    surface: "readiness/<id>/governance-handoff.json"
    consumers: [governance]
  - id: governance-policy
    version: "1"
    owner: governance
    surface: ".fsgg/policy.yml"
    consumers: [templates]
  - id: governance-capabilities
    version: "2"
    owner: governance
    surface: ".fsgg/capabilities.yml"
    consumers: [templates]
  - id: governance-tooling
    version: "1"
    owner: governance
    surface: ".fsgg/tooling.yml"
    consumers: [templates]
  - id: governance-descriptor
    version: "1"
    owner: governance
    # ADR-0005: governance's project descriptor (ProjectFacts, read by Config.Loader) is the
    # `.fsgg/governance.yml` slot — renamed from `.fsgg/project.yml` (clean break, no alias) so it
    # no longer collides with SDD's `.fsgg/project.yml` in a shared `.fsgg/`. Internal type names
    # (ProjectFacts) unchanged; only the on-disk filename/slot moves.
    surface: ".fsgg/governance.yml"
    consumers: [governance]
  - id: governance-reference-gate-set
    version: "1.2.1.1"
    package-version: "1.2.1.1"
    owner: governance
    # .github#15 (H3, epic #16 Pillar 3): the validated reference .fsgg gate set published as a
    # content-only NuGet package FS.GG.Governance.ReferenceGateSet — ONE versioned source of truth
    # for the Templates overlay drift gate (Templates#14). Packs the four files IN PLACE from
    # samples/sdd-reference-gate-set/.fsgg/ (single source, byte-identical, 0 drift); ships no
    # assembly and no dependency group (content-only — installing imposes no governance runtime
    # dependency). Version is DERIVED from the four contained schemaVersion declarations:
    # Version = "{governance}.{capabilities}.{policy}.{tooling}" = 1.2.1.1 today; a bump to any one
    # file's schemaVersion changes exactly one segment (deterministic + distinguishable, ADR-0007).
    # Production is gated on the G1–G7 reference-set guard, so the shipped artifact is provably the
    # tested artifact. It bundles the governance-policy@1 / governance-capabilities@2 /
    # governance-tooling@1 / governance-descriptor@1 surfaces as one pinnable set.
    # Feed: local/CI `dotnet pack` to ~/.local/share/nuget-local/ now; org GitHub Packages push
    # DEFERRED (admin-blocked, .github#21).
    surface: >
      FS.GG.Governance.ReferenceGateSet content package —
      contentFiles/any/any/.fsgg/{governance,capabilities,policy,tooling}.yml, byte-identical to
      samples/sdd-reference-gate-set/.fsgg/; version-derivation rule per ADR-0007.
    consumers: [templates]   # Templates#14 overlay drift gate (git diff --exit-code)
    bundles: [governance-policy, governance-capabilities, governance-tooling, governance-descriptor]
  - id: fs-gg-ui-template
    version: "0.1.52-preview.1"   # template FsGgUiVersion pin (tag fs-gg-ui/v0.1.52-preview.1)
    package-version: "0.1.52-preview.1"   # PUBLISHED FS.GG.UI.Template package (was 0.1.50-preview.1)
    package-tag: "fs-gg-ui-template/v0.1.52-preview.1"   # template-scoped coherent-set tag (Feature 206/215)
    owner: rendering
    surface: "dotnet new fs-gg-ui (template/base) + FS.GG.UI.* framework packages"
    consumers: [templates, sdd]
    # Feature 212 (FS.GG.Rendering#9), released as the coherent set 0.1.52-preview.1 (Feature 215):
    # the template now GUARANTEES a root-buildable generated product. Additive (no behavior break);
    # emitted for every profile × lifecycle, byte-neutral across designSystem. SDD composition-
    # acceptance probes consume this stock surface; the release.yml template-product-tests gate
    # asserts it on the real release. See coherence id fs-gg-ui-template.
    root-buildable:
      since: "Feature 212 (2026-06-28); released 0.1.52-preview.1 (Feature 215)"
      surface: "root <Name>.slnx (refs src/<Name> + tests/<Name>.Tests) + global.json (net10.0 band, rollForward latestFeature) + build.sh/build.cmd verb wrapper (restore|build|test|run|verify|pack → FAKE; Verify/Test frozen)"
      stock-commands: "dotnet restore|build|test; dotnet run --project src/<Name> (headless exit 0 via UnsupportedEnvironment) — no FAKE knowledge required"
      tracking: "https://github.com/FS-GG/FS.GG.Rendering/issues/9"
    # ADR-0002: lifecycle is a template parameter (choice symbol).
    parameters:
      lifecycle:
        type: "choice (spec-kit|sdd|none)"
        default: "spec-kit"   # byte-identical to pre-ADR-0002 output; existing profile tests unchanged
        notes: >
          sdd -> app-only product + SDD skeleton; none -> emits neither .specify/ nor a
          constitution. Gates .specify/, constitution, .agents/, .template.config/generated/.
    behavior-break:
      feature: "FS.GG.Rendering Feature 205 — side-effect-free template generation"
      date: "2026-06-27"
      summary: >
        The fs-gg-ui template no longer auto-runs git-init/chmod post-actions at generation time.
        The `skipGitInit` opt-out option is REMOVED; a new `initGit` opt-in (bool, default false)
        reproduces the convenience for direct callers (pair with `--allow-scripts yes` for
        non-interactive runs). Default generation is now side-effect-free: no spawned process, no
        Git repository, no hang in CI / IDE "new project" hosts. No emitted file changes.
      consumer-action: >
        SDD scaffold path must stop relying on template auto-init and own repo-init + chmod as
        explicit post-instantiation steps (contract §5 S1–S3). Direct callers that passed
        `--skipGitInit true` simply drop the flag; callers that relied on auto-init pass
        `--initGit true`.
      contract-doc: "FS.GG.Rendering specs/205-scaffold-git-init-chmod/contracts/fs-gg-ui-template-generation.md (Accepted)"
      tracking: "https://github.com/FS-GG/FS.GG.SDD/issues/1 (cross-repo follow-up for the scaffold-path execution)"
  - id: shared-build-config
    version: "1.0.0"
    owner: github   # the FS-GG/.github org repo is the source of truth
    # ADR-0006 / .github#19 (H3, Pillar 5): the canonical org-shared .NET build config —
    # Directory.Build.props (determinism, CPM + transitive pinning, lockfile-restore-enforcement
    # gate, NU1603/NU1608->error), Directory.Packages.props (CPM + org FSharp.Core 10.1.301 pin),
    # and .config/dotnet-tools.json (fake-cli 6.1.4). Distributed verbatim via
    # scripts/sync-build-config.sh; repo-specific settings live in the imported *.local.props.
    # The script's --check mode is the drift gate consumed by the reusable coherence workflow
    # (#18, LANDED): consumer repos call contract-coherence.yml with check-build-config: true.
    # #29: --check compares byte-for-byte (not XML-aware), so a malformed-but-verbatim source could
    # pass the gate yet fail every adopter's build (MSB4024); the script now asserts source .props
    # XML well-formedness before distributing/checking.
    # #20 (H3, Pillar 5): the config now also carries the OPT-IN api-breaking-change-gate —
    # PublicApiAnalyzers (pinned 3.3.4) + SDK Package Validation/ApiCompat, gated on FsggApiGate and
    # OFF by default so a re-sync stays non-breaking under locked restore. Surface unchanged (same 3
    # files + script); no shared-build-config version bump. Per-repo adoption: coherence id
    # apicompat-publicapi-gate.
    surface: "dist/dotnet/{Directory.Build.props,Directory.Packages.props,.config/dotnet-tools.json} + scripts/sync-build-config.sh"
    consumers: [rendering, sdd, governance, templates]
    docs: "docs/build/README.md"

# Hard dependency edges (downstream -> upstream).
dependencies:
  # ADR-0002: vendoring retired. Templates composes the rendering app via scaffold, not a fork.
  - { from: templates, to: rendering,  via: "fs-gg-ui-template@0.1.50-preview.1 composed via scaffold-provider (lifecycle=sdd); no vendored payload" }
  - { from: templates, to: sdd,        via: "scaffold-provider@1 + SDD skeleton" }
  - { from: templates, to: governance, via: "governance-policy@1 / capabilities@2 / tooling@1 config" }
  - { from: templates, to: governance, via: "governance-reference-gate-set@1.2.1.1 (content package — overlay drift-gate source of truth, Templates#14)" }
  - { from: sdd,       to: governance, via: "governance-handoff@1 (OPTIONAL; SDD runs fully without Governance)" }
  # rendering depends on no other FS-GG product (it never depends on Governance).

# Known coherence state. `coherent: false` is a standing cross-repo request.
coherence:
  - id: fs-gg-ui-version
    coherent: true
    owner: rendering
    summary: >
      Resolved 2026-06-27: the fs-gg-ui template pins FsGgUiVersion=0.1.50-preview.1 — the
      complete coherent 16-package FS.GG.UI.* set — behind the immutable annotated tag
      fs-gg-ui/v0.1.50-preview.1. All four template profiles (app, headless-scene, governed,
      sample-pack) generate -> restore -> build -> evidence -> governance green against the single
      pin; the phantom FS.GG.UI.Color / FS.GG.UI.SkillSupport pins were removed; restores are
      byte-reproducible (RestorePackagesWithLockFile). The 0.1.0-preview.1 pin and the missing
      release tag are gone.
    resolved_by: "FS-GG/FS.GG.Rendering@57be86c — tag fs-gg-ui/v0.1.50-preview.1 (closes #1)"
    note: >
      Renamed fs-skia-ui-version -> fs-gg-ui-version (version property FsSkiaUiVersion ->
      FsGgUiVersion; tag namespace fs-skia-ui/v* -> fs-gg-ui/v* at the same commits) by
      FS.GG.Rendering feature 208 — a clean break, no compatibility alias (ADR-0003 Accepted).
    impact: "FS.GG.Templates fs-gg-fullstack and FS.GG.SDD scaffold consumers can build the rendering app against a tagged, reproducible FS.GG.UI.* set."
    tracking: "https://github.com/FS-GG/FS.GG.Rendering/issues/1"
    enforcement: >
      2026-06-28 (FS.GG.Rendering Feature 209): drift on this row is now STRUCTURALLY enforced by
      FS.GG.Rendering's merge-blocking gate. A new "Version coherence guard" step
      (scripts/validate-version-coherence.fsx) re-derives, on every PR before merge to main, that the
      single FsGgUiVersion literal matches an existing fs-gg-ui/v* snapshot tag and does NOT lag the
      latest (preview-aware compare), independent of any warnings-as-errors policy; a scoped Release
      pack + clean restore grounds that the pin resolves to the COMPLETE member set (FR-008). During
      Feature 209 the guard caught a real staleness instance (the FsGgUiVersion literal lagging the
      latest fs-gg-ui/v* snapshot tag), which was corrected in-repo; the gate then keeps this row's
      pin current structurally on every subsequent PR. The authoritative current pin value is the
      row summary above (and the fs-gg-ui-template contract). No registry schema change — coherent:
      true is now upheld automatically rather than by manual review. Tier 2, upheld not modified.
  - id: fs-gg-ui-bom
    coherent: true
    owner: rendering
    summary: >
