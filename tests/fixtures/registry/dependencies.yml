      STEP (1) DONE: FS.GG.Contracts 1.1.0 is PUBLISHED on the org feed (SDD#27 closed; feed serves
      1.1.0 + 1.0.1) and FS.GG.SDD.Cli 0.2.0 (the `fsgg-sdd` tool carrying the validator) is published
      + public (SDD#31 closed), so the gate CAN now install + run the typed CLI from the feed.
      STEP (2) ATTEMPTED + RE-BLOCKED (2026-06-28, .github#49): on first real wiring the typed CLI
      FAILS the actual, valid registry — `fsgg-sdd registry validate` exits 1 with MalformedVersion
      for governance-reference-gate-set's `version`/`package-version` `1.2.1.1`, while the Python
      stand-in passes. Root cause: Fsgg.Registry's version grammar does NOT accept the 4-segment
      NuGet/System.Version form (`major.minor.patch.revision`), but `1.2.1.1` is LEGITIMATE — ADR-0007
      derives it from the four contained schemaVersions, and the stand-in's regex deliberately permits
      the optional 4th segment. So the "rule kinds mirror validate-registry.py" claim is INCOMPLETE
      (the 4-segment case diverges; bare integers `1`/`2` and `-preview` prereleases are handled).
      Swapping the gate as-is would turn contract-coherence RED on every FS-GG repo (registry valid,
      validator wrong), so the gate stays on the Python stand-in and this id stays coherent:false.
      REMAINING to flip coherent:true: FS.GG.SDD fixes the 4-segment grammar in Fsgg.Registry +
      republishes the CLI (SDD#32), then .github#49 pins the new CLI in contract-coherence.yml and
      retires validate-registry.py. The typed fsgg-contracts version-coupling assertion (registry's
      declared pin == actual package version) IS already live, independent of the schema validator.
    impact: "Typed validator EXISTS and is installable from the feed (SDD#27/#31), but on first real wiring (.github#49) it rejects the valid 4-segment version 1.2.1.1 (governance-reference-gate-set, ADR-0007) that the stand-in accepts — a grammar gap in Fsgg.Registry. CI schema validation stays the Python stand-in until SDD#32 fixes the grammar + republishes the CLI and #49 adopts it. Drift risk stays low (stand-in is the authority and is correct); the typed-validator swap is paused, not regressed."
