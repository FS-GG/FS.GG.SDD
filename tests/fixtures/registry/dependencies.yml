  - id: apicompat-publicapi-gate
    coherent: true
    owner: github
    summary: >
      H3 / FS-GG/.github#20 (epic #16 Pillar 5): a public-API breaking-change gate now ships in the
      org-shared shared-build-config — Microsoft.CodeAnalysis.PublicApiAnalyzers (centrally pinned
      3.3.4) plus the SDK-integrated Package Validation/ApiCompat — so a break on a packable library
      (FS.GG.Contracts, FS.GG.UI.*) forces a SemVer major that the registry ranges then enforce.
      The .github source-of-truth slice is DONE (the gate is wired into dist/dotnet and documented),
      but it is OPT-IN and OFF by default (FsggApiGate): enabling it adds a PackageReference and so
      changes packages.lock.json, which would break a locked restore if forced on at sync time. Each
      consumer therefore adopts it deliberately — set FsggApiGate=advisory, commit PublicAPI.Shipped/
      Unshipped.txt baselines per packable project (regenerating the lockfile), then ratchet to
      FsggApiGate=required (+ PackageValidationBaselineVersion) once the surface is stable.

      MECHANISM (recorded 2026-06-28, FS.GG.Governance spec 088 research D1): for the F# packables
      (FS.GG.Contracts, FS.GG.UI.*, the governance libraries) the operative detector is the
      language-agnostic SDK ApiCompat / Package Validation (assembly+package level) — NOT
      PublicApiAnalyzers, which is a Roslyn/C# source analyzer and does not analyze F#. The
      PublicApiAnalyzers half of the shared gate therefore only bites on any C# packable project;
      the source-level public-surface record for the F# packages stays the constitution's committed
      .fsi signatures + reflective surface/*.surface.txt baselines. The ApiCompat detector lives only
      at the I/O edge (pack/compare-vs-feed) — the pure leaves gain no new dependency.

      BASELINES NOW EXIST (org feed populated 2026-06-28, superseding the earlier "feed empty"
      status): the org GitHub Packages feed carries FS.GG.Contracts 1.0.1 (SDD release v1.0.1) and
      the full FS.GG.UI.* set @ 0.1.52-preview.1 (Rendering). So for the SDD- and Rendering-owned
      packables the H4-feed coupling is RESOLVED — Package Validation can diff against a real
      published baseline today (set PackageValidationBaselineVersion to that version). Only the
      FS.GG.Governance.* packages are still unpublished, so NoBaselineYet remains true for them
      alone, not for the gate as a whole.

      ADOPTION SO FAR: FS.GG.Governance landed its advisory gate (spec 088) — additive
      ReleaseRuleKind.ApiCompatibility + the pure break×SemVer-delta verdict table, a
      pack-and-apicheck.fsx detector that packs all 71 IsPackable packages and grades vs a baseline
      feed, and an advisory (continue-on-error, never-reddens) job in gate.yml; its packages resolve
      NoBaselineYet (its own artifacts aren't on the feed yet). RESOLVED 2026-06-28 — both
      contract-package repos adopted the gate and ratcheted it to ENFORCING via a dedicated
      api-compatibility-gate CI job (the F#-correct realization of the "required" stage: the job's
      run fails on a real CP#### break; the shared FsggApiGate knob, being PublicApiAnalyzers-centric,
      is not used for these F# packages). FS.GG.Rendering enforces over the 17 FS.GG.UI.* packables
      vs the 0.1.52-preview.1 baseline (FS.GG.Rendering#22 adopt + #25 ratchet); FS.GG.SDD enforces
      FS.GG.Contracts vs the 1.0.1 baseline (FS.GG.SDD#28 adopt + #29 ratchet). The detector packs
      with EnablePackageValidation OFF in the normal build (a separate job) and exits non-zero ONLY on
      a genuine break — NoBaselineYet / Indeterminate never fail it — so the gate is robust, not
      flaky. Enforcement is at the workflow level (these repos have no branch protection — the same
      model as [[lockfile-restore-enforcement]]); adding the job to branch-protection required checks
      would additionally hard-block the merge button if the org adopts branch protection.
      FS.GG.Governance keeps its own spec-088 maturity track (advisory → BlockOnRelease on SC-005);
      its packages are unpublished (NoBaselineYet) and out of this id's scope.
    impact: "Public-API breaks on FS.GG.Contracts and FS.GG.UI.* are now caught: a removed/changed public member fails the api-compatibility-gate run against the published feed baseline, forcing a SemVer major (which the registry ranges enforce). Enforcement is workflow-level (no branch protection on these repos yet — adding the job to branch-protection required checks would also hard-block the merge button)."
    tracking: "https://github.com/FS-GG/.github/issues/20"
