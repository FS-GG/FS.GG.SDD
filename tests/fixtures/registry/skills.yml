# FS-GG org skill registry — the single authoritative catalog of process + product skills.
#
# ADR-0017 (condition-aware materialization). Design: docs/coordination/skill-registry.md.
# Sibling of registry/dependencies.yml: `schemaVersion`, an `updated:` date, a governed schema
# (contract `skill-registry`, ADR-0015), a docs/registry/ projection, and a changelog
# (registry/skills.CHANGELOG.md). Human projection: docs/registry/compatibility.md (§Skill registry).
#
# GENERATED / RECONCILED FROM THE PRODUCER MANIFESTS — never hand-authored bytes. Every `sha256`
# is the canonical-body digest of the owning repo's SKILL.md (byte-equivalent to `sha256sum
# SKILL.md`; the `Fsgg.SkillMirror` algorithm, verified .github#120). `materializes-when` is the
# ADR-0017 predicate the union gate (scripts/skill-union-assert.sh --params) evaluates against a
# scaffold's `scaffold-provenance.json` effectiveParameters. Absent ⇒ `always`.
#
# SOURCES OF THIS SNAPSHOT (.github#168, epic #163):
#   * PRODUCT skills (21) — SPLIT across TWO producers after the ADR-0022 P4 skill-ownership migration
#     (2026-07-06, epic #213/#218): 17 rows owned by `fs-gg-rendering` (reconciled from
#     FS.GG.Rendering's `template/skill-manifest/skill-manifest.json`) + 4 GAME rows now owned by
#     `fs-gg-game` (reconciled from FS.GG.Game's `template/skill-manifest/skill-manifest.json`,
#     merged FS.GG.Game#4). The four migrated rows — `fs-gg-game-core`/`fs-gg-audio`/
#     `fs-gg-persistence`/`fs-gg-model-swap` (all `profile in [game, sample-pack]`) — moved
#     BYTE-IDENTICALLY; FS.GG.Rendering STILL ships frozen copies from `--profile game` (two-copies
#     cost, ADR-0022 §6, retired at P6). The migration also corrected two digests that had drifted from
#     Rendering's live manifest (Feature 250 / 0.1.67 body changes): `fs-gg-game-core` 87b9c55c…→16fd32b7…
#     and `fs-gg-model-swap` 68edbe46…→a48df195…. registry = manifest = bytes for all 21 rows.
#     2026-07-10 completeness reconcile (.github#298, epic #266): the product set grew 20→21 —
#     `fs-gg-feedback-report` was vendored into Rendering on 2026-07-10 (Rendering#248, PR #251) and
#     was never flipped here. It is the FIRST row the `declared-completeness` arm caught after that
#     arm shipped (.github#289/PR #293, twelve minutes later) — the assertion working on live drift
#     rather than on the backlog it was written for. Like its sibling `fs-gg-feedback-capture` it is
#     `feedback`-gated and supplied from a `template/<feature>/skill/` path rather than the usual
#     `template/product-skills/<id>/`; unlike it, the predicate carries NO `lifecycle` clause, so the
#     report skill materializes on every lane whose `feedback == true`. Reconciled verbatim from
#     Rendering's producer manifest by `--write` (which appends it, per .github#289), then RE-HOMED
#     from the appended tail into the product block beside its sibling — as `--write`'s own emitted
#     comment instructs. The row's bytes are the tool's; only its position and annotation are ours.
#     2026-07-10 completeness reconcile (.github#289, epic #266): the product set grew 16→20 —
#     `fs-gg-collision`/`fs-gg-grids`/`fs-gg-line-drawing`/`fs-gg-visibility` had shipped on
#     2026-07-05 (0.1.65-preview.1) and were never flipped here. The gate could not say so: it only
#     asserted predicates over rows already declared, never manifest ⊆ registry. It does now.
#     HISTORY of the 12 Rendering rows: reconciled verbatim from FS.GG.Rendering's published manifest
#     (Feature 238, merged FS.GG.Rendering#76, closes Rendering#71); `sha256` + emission condition are
#     authoritative. (`fs-gg-game-core` was dropped from the .github#168 provisional product count of
#     12 — the manifest has always declared 13; reconciled .github registry changelog 2026-07-04.)
#     2026-07-05 catch-up (Rendering#113): the manifest grew 13→16 — `fs-gg-audio` and
#     `fs-gg-persistence` (Rendering Features 243/244) shipped but were never flipped here, and
#     `fs-gg-model-swap` (Rendering#113, same gate) was added. The predicates below are the
#     ADR-0017 CANONICAL grammar (`==`/`!=`/`in [..]`/`and`/`or`/`always`). Rendering shipped a
#     C-style form (`(profile == "app" || ...)`) until Rendering#77 (closed 2026-07-04, commit
#     cf93eabd) aligned its manifest on the canonical grammar; both sides have emitted it since, so
#     nothing is normalized on the way in and `predicate-matches` compares them directly. (The
#     enforcing flip of coherence `skill-registry-published`, gated on that alignment, is .github#290.)
#     2026-07-10 predicate reconcile (.github#292, epic #266): `materializes-when` was NEVER
#     enforced — the gate asserted digests and (since #289) row presence, so a producer could move a
#     skill's emission condition and this catalog silently kept the old one. `fs-gg-testing` had:
#     Rendering deliberately widened it from `profile == governed` to all five profiles on
#     2026-07-04 (Rendering#90, commit f4abd68c — a cross-repo request FROM this repo, accepted), and
#     the row sat stale for six days while every digest stayed green. Reconciled to the manifest.
#   * PROCESS skills (16) — RECONCILED from SDD's EMITTED process producer manifest
#     `.agents/skills/skill-manifest.json` (schema `skill-manifest` v1, FS.GG.SDD#111 closing
#     cross-repo #109; regenerable/checkable via `fsgg-sdd registry skill-manifest --write|--check`,
#     drift-guarded against `SeededSkills.skillNames` + the authored `SKILL.md` digests). Each
#     `sha256` is the same `Fsgg.SkillMirror` canonical-body digest the registry declares
#     (`sha256sum SKILL.md`-equivalent), so registry = manifest = bytes for the process set. The set
#     grew 15→16: `fs-gg-sdd-troubleshooting` was added (SDD#108), and features 070/071 changed four
#     bodies (checklist, clarify, lifecycle, tasks) after the .github#168 provisional snapshot — all
#     re-reconciled here against the emitted manifest. All 16 are `always` (canonical grammar).
#
# BLOCKED-ON (final flip only): BOTH producer-side conditions are now CLEARED (.github#290) — the P2
# process-manifest emission (SDD#111) and the Rendering predicate-grammar alignment (FS.GG.Rendering#77,
# closed 2026-07-04 in cf93eabd; `scripts/generate-skill-manifest.fsx` normalizes C-style → canonical on
# emit, and the shipped manifest carries zero C-style predicates). The catalog + `skill-registry` contract
# already landed (.github#168). What remains before flipping coherence `skill-registry-published` → true
# is now .github-side only: publish the typed `Fsgg.Registry` validator assertion over this file, then
# flip the row and update the `skill-mirror-verified` / `fsgg-sdd-orchestrator-axis` cross-refs.
# The flip must NOT precede a green skill-registry-coherence on main (epic .github#266, fails-open class).

# THE `mirrored:` FIELD (.github#658, epic #266) — ADR-0022 §6's frozen-mirror obligation, DECLARED.
#
# `mirrored: true` means "ADR-0022 §6 REQUIRES FS.GG.Rendering to ship a byte-identical copy of this
# body". It is an OBLIGATION the OWNER asserts, reconciled verbatim from the producer manifest
# (FS.GG.Game#280 added it) — never an observation that Rendering happens to hold a same-named file.
# The distinction is the whole subtlety of the field, and getting it wrong is not hypothetical:
#
#   * Classify on the OBLIGATION and there are FOUR — the ADR-0022 P4 migrations (`fs-gg-game-core`,
#     `fs-gg-audio`, `fs-gg-persistence`, `fs-gg-model-swap`), whose bodies Rendering still ships
#     frozen from `--profile game`.
#   * Classify on the NAME COLLISION and there are eight, because `fs-gg-collision`/`fs-gg-grids`/
#     `fs-gg-line-drawing`/`fs-gg-visibility` also exist in both trees — and are under NO such
#     obligation: they were rewritten against the `.fsi` and DELIBERATELY diverge.
#     FS.GG.Rendering#541 is carrying that wrong set.
#
# ABSENT IS "NOT CLASSIFIED", NOT `false`. `select(.mirrored == true)` reads an absent field as false
# (`null == true` is false), so a manifest predating the field answers "not mirrored" for EVERY body,
# confidently, and every real mirror goes unguarded — the trap FS.GG.Game#282 nearly shipped. So the
# 33 rows below that carry no `mirrored:` are not asserting "no obligation"; they are rows for which
# the question does not arise, because FS.GG.Rendering holds no second copy of them. The moment it
# does, `fsgg-skill-registry-check`'s `mirror-verdict` arm goes RED until the owner declares one:
# undeclared is not `not mirrored`. Do NOT "tidy" the file by adding `mirrored: false` everywhere —
# that would manufacture, by hand, exactly the confident default the gate exists to refuse.
#
# `schemaVersion` IS 1, AND A BUMP TO 2 IS OWED. Read the scalar below as a DEBT, not as "no growth".
#
# Adding `mirrored:` grew this document's schema. .github#686 decided that an OPTIONAL, ADDITIVE,
# back-compatible field IS schema growth under ADR-0015 — the ADR's own motivating defect (M5) was
# additive growth under "additive tolerance", so "no reader breaks" is the MECHANISM of that defect,
# not an exemption from it. So `schemaVersion` 1 → 2 (and `skill-registry.version` 1 → 2 in
# registry/dependencies.yml) is OWED.
#
# It is UNPAID here on purpose. The typed validator (Fsgg.Registry, FS.GG.SDD) does not yet assert over
# THIS FILE AT ALL — publishing that assertion is what the enforcing flip still waits on. Bumping now
# would version a schema no validator reads, and pin a CLI that carries nothing: a claim with nothing
# behind it (the .github#416 ornament). The debt is paid publish-before-flip (FR-007), in this order:
#   1. FS.GG.SDD#420 teaches Fsgg.Registry the field and PUBLISHES a CLI carrying it;
#   2. .github THEN bumps this scalar + the contract `version` and advances the contract-coherence.yml
#      FS.GG.SDD.Cli pin to that CLI.
# ADR-0015 §3 still says to do both in the SAME PR. That is unsatisfiable — this document lives in
# .github and its validator lives in FS.GG.SDD, and no PR spans two repos. Correcting the ADR is
# .github#689.
