name: composition-acceptance

# The opt-in, network-gated real-provider composition acceptance (feature 034). It is
# separate from the offline inner loop: it runs on a schedule, on manual dispatch, or on a
# `composition-registry-updated` repository_dispatch pushed by FS.GG.Templates (feature 041),
# with FSGG_SDD_ACCEPTANCE_REGISTRY pointing at the registry that resolves the real published
# rendering template. Generic SDD carries no rendering identity; the real template is reached
# only through that registry (FR-009 / FR-010). Source selection is the deterministic resolver
# scripts/workflows/resolve-acceptance-registry.sh; the acceptance facts run unchanged.
#
# A scheduled run with no FSGG_SDD_ACCEPTANCE_REGISTRY secret configured is the opt-in/unset
# (sender-dormant) case: the Preflight step neutral-skips it rather than failing nightly.
# Dispatch and manual runs always carry an explicit source and stay fail-closed.

on:
  schedule:
    # Nightly at 04:17 UTC (off-peak; avoids the top-of-hour stampede).
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      registry_path:
        description: "Optional path to a checked-out registry file; overrides the secret."
        required: false
        type: string
  repository_dispatch:
    # The Templates producer pushes the canonical registry content on every change (feature 041,
    # contract: composition-registry-updated v1). Only this event type triggers the acceptance.
    types: [composition-registry-updated]

# A burst of upstream registry edits supersedes in-flight runs: only the latest content is tested
# (spec Edge Cases — "Burst of upstream registry edits").
concurrency:
  group: composition-acceptance
  cancel-in-progress: true

jobs:
  composition-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          # No restore cache: this workflow's restore footprint differs from the gate's, and
          # setup-dotnet keys the cache only on hashFiles(packages.lock.json)+OS+runtime with
          # no per-job component, so caching here would share and poison the deterministic
          # gate's key (#92 / NU1403). A fresh restore is fine here.

      - name: Preflight registry source
        id: preflight
        env:
          REGISTRY_SECRET_CONTENT: ${{ secrets.FSGG_SDD_ACCEPTANCE_REGISTRY }}
        run: |
          # The acceptance is opt-in / network-gated (034) and its registry sender stays dormant
          # until the org App + secrets are provisioned (.github#21). A *scheduled* run with no
          # secret configured is therefore the legitimate opt-in/unset case — nothing to resolve —
          # so it neutral-skips instead of hard-failing nightly. Dispatch and manual runs always
          # carry an explicit source and proceed to the fail-closed resolver, where a missing or
          # mismatched source is still a wiring defect that MUST fail (FR-005 / SC-003).
          if [ "${{ github.event_name }}" = "schedule" ] && [ -z "$REGISTRY_SECRET_CONTENT" ]; then
            echo "run_acceptance=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No FSGG_SDD_ACCEPTANCE_REGISTRY secret configured; skipping the scheduled composition-acceptance run (dispatch and manual runs are unaffected)."
            {
              echo "### composition-acceptance skipped"
              echo
              echo "Scheduled run with no \`FSGG_SDD_ACCEPTANCE_REGISTRY\` secret configured — the registry sender is still dormant, so there is nothing to resolve and the real-provider acceptance was skipped. The \`composition-registry-updated\` dispatch and manual \`workflow_dispatch\` paths still run fail-closed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run_acceptance=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize the external provider registry
        if: steps.preflight.outputs.run_acceptance == 'true'
        env:
          # Deterministic precedence (FR-004): manual input > dispatched content > scheduled secret.
          REGISTRY_PATH_INPUT: ${{ inputs.registry_path }}
          FSGG_DISPATCH_REGISTRY_CONTENT: ${{ github.event.client_payload.registry_content }}
          FSGG_DISPATCH_REGISTRY_SHA256_12: ${{ github.event.client_payload.registry_sha256_12 }}
          REGISTRY_SECRET_CONTENT: ${{ secrets.FSGG_SDD_ACCEPTANCE_REGISTRY }}
        run: bash scripts/workflows/resolve-acceptance-registry.sh

      - name: Run the composition acceptance
        if: steps.preflight.outputs.run_acceptance == 'true'
        run: dotnet test FS.GG.SDD.sln --filter "kind=composition-acceptance"
