name: composition-acceptance

# The opt-in, network-gated real-provider composition acceptance (feature 034). It is
# separate from the offline inner loop: it runs on a schedule, on manual dispatch, or on a
# `composition-registry-updated` repository_dispatch pushed by FS.GG.Templates (feature 041),
# with FSGG_SDD_ACCEPTANCE_REGISTRY pointing at the registry that resolves the real published
# rendering template. Generic SDD carries no rendering identity; the real template is reached
# only through that registry (FR-009 / FR-010). Source selection is the deterministic resolver
# scripts/workflows/resolve-acceptance-registry.sh; the acceptance facts run unchanged.

on:
  schedule:
    # Nightly at 04:17 UTC (off-peak; avoids the top-of-hour stampede).
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      registry_path:
        description: "Optional path to a checked-out registry file; overrides the secret."
        required: false
        type: string
  repository_dispatch:
    # The Templates producer pushes the canonical registry content on every change (feature 041,
    # contract: composition-registry-updated v1). Only this event type triggers the acceptance.
    types: [composition-registry-updated]

# A burst of upstream registry edits supersedes in-flight runs: only the latest content is tested
# (spec Edge Cases — "Burst of upstream registry edits").
concurrency:
  group: composition-acceptance
  cancel-in-progress: true

jobs:
  composition-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Materialize the external provider registry
        env:
          # Deterministic precedence (FR-004): manual input > dispatched content > scheduled secret.
          REGISTRY_PATH_INPUT: ${{ inputs.registry_path }}
          FSGG_DISPATCH_REGISTRY_CONTENT: ${{ github.event.client_payload.registry_content }}
          FSGG_DISPATCH_REGISTRY_SHA256_12: ${{ github.event.client_payload.registry_sha256_12 }}
          REGISTRY_SECRET_CONTENT: ${{ secrets.FSGG_SDD_ACCEPTANCE_REGISTRY }}
        run: bash scripts/workflows/resolve-acceptance-registry.sh

      - name: Run the composition acceptance
        run: dotnet test FS.GG.SDD.sln --filter "kind=composition-acceptance"
