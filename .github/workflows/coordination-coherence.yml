# coordination-coherence — thin caller for the shared reusable gate (FS-GG/.github, ADR-0019).
#
# This repo is declared a `coordination-kit` receiver in FS-GG/.github registry/repos.yml, so it
# holds a copy of the coordination kit — the cross-repo-coordination skill
# (.claude/skills + .agents/skills) and the fsgg-coord client (scripts/fsgg-coord). The reusable
# gate checks out FS-GG/.github (the canonical kit source) alongside this repo and runs
# `scripts/coordination-sync --check`, failing CI if this repo's copy drifts from — or is missing
# against — canonical. A non-receiver would pass trivially; this repo is a receiver, so it is
# enforced. Kit changes arrive via the auto-sync PR the `coordination-propagate` workflow opens.
# Fix drift by running `scripts/coordination-sync <this-checkout>` from a FS-GG/.github checkout.
#
# All mechanics + rationale live in the reusable workflow:
#   FS-GG/.github .github/workflows/coordination-coherence.yml
name: coordination-coherence

# The PR trigger is UNSCOPED — it runs on every PR, matching all five sibling receivers. It once
# carried a `paths:` filter (#370) so it fired only on PRs that touched a kit file, because the gate
# compares this repo's vendored kit against FS-GG/.github@main — a MOVING TARGET — and in the window
# before the auto-sync PR lands, main is genuinely stale, so the strict compare went red on EVERY
# open PR at once, naming files the PR never touched (PR #366 reddened on a one-line F# test change).
#
# That workaround is now REDUNDANT and has been REMOVED (#525). FS-GG/.github#450 (landed
# the same day, hours after #370) taught the reusable gate to ATTRIBUTE drift on a `pull_request`: it
# hands the script the base branch's CURRENT tip and reports only the drift the BRANCH AUTHORED
# (merge-base-relative). A PR that touches no kit file authors no drift, so it stays green even
# mid-sync-window; inherited staleness becomes a non-blocking advisory that names coordination-propagate
# as the owner. The strict compare — the verdict of record on this repo's kit — still runs on
# `push: branches: [main]`, unchanged, including on the sync bot's own PR when it merges.
#
# The filter HAD to go: a `paths:`-scoped workflow does not run on a non-kit PR, so its check context
# never posts — and a REQUIRED context that never posts wedges every such PR at `Expected` forever.
# Dropping the filter makes `kit / coordination-kit` report a concluded status on every PR, which is
# the precondition FS-GG/.github#490 needs to mark it required across the receivers. #450 is what makes
# always-running safe: the two changes compose exactly, so re-adding a `paths:` filter here would
# re-wedge the required context — do not.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kit:
    uses: FS-GG/.github/.github/workflows/coordination-coherence.yml@main
