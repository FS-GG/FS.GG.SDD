# Renovate lockfile-sync — thin caller for the shared reusable workflow (FS-GG/.github#145).
#
# Regenerates the committed packages.lock.json on renovate/* PRs so the locked-restore gate
# (gate.yml — Feature 211 / ADR-0006) goes green without a human running
# `dotnet restore --force-evaluate` by hand. Renovate edits the central <PackageVersion>
# without running restore, so a referenced-package bump would otherwise fail with NU1004.
#
# All mechanics + rationale (App-token push that re-triggers the gate, renovate/*-same-repo
# gating, self-limiting second pass) live in the reusable workflow:
#   FS-GG/.github .github/workflows/lockfile-sync.yml
name: lockfile-sync

on:
  pull_request:
    branches: [main]

permissions:
  contents: read   # the App token inside the reusable workflow performs the write
  packages: read   # required ceiling for the reusable workflow's declared packages:read
                   # (org NuGet-feed auth for consumer repos, FS-GG/.github#148/#149) — a
                   # reusable workflow cannot request a permission the caller didn't grant,
                   # so omitting this fails the whole workflow at startup (startup_failure).

jobs:
  sync:
    uses: FS-GG/.github/.github/workflows/lockfile-sync.yml@main
    with:
      restore-target: FS.GG.SDD.sln
    secrets:
      app-id:          ${{ secrets.FSGG_DISPATCH_APP_ID }}
      app-private-key: ${{ secrets.FSGG_DISPATCH_APP_PRIVATE_KEY }}
