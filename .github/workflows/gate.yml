name: gate

# Per-PR deterministic gate. The load-bearing enforcement for the FsGgUiVersion-style
# staleness bug class (FS-GG/.github#7, Feature 211 parity): restore in --locked-mode against
# the committed packages.lock.json so any dependency-graph drift, or a silently substituted
# version (NU1603) / out-of-range version (NU1608), fails the build instead of resolving
# quietly. This is separate from composition-acceptance.yml (nightly, network-gated).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Deterministic gate (locked restore + build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # NO NuGet cache on this job, deliberately (FS-GG/.github#429).
          #
          # This previously read `cache: true`, justified as "Speed only — --locked-mode still
          # enforces." That justification was FALSE, and it was the load-bearing assumption of
          # the whole gate. --locked-mode validates the committed contentHash against whatever
          # copy of the package is already in the global-packages folder; a cache hit therefore
          # satisfies the gate from a STALE package without ever contacting the feed. When
          # FSharp.Core 10.1.301 was re-published, this gate stayed green on a main whose
          # lock files no fresh clone could restore — and went red on the correct re-pin, because
          # changing the lock files busted the cache key. A cache that can decide the verdict is
          # not "speed only".
          #
          # The locked-restore action now resolves into a fresh, empty NUGET_PACKAGES with the
          # HTTP cache cleared, so this job's package folder is cold by construction and a
          # setup-dotnet cache would be pure overhead (restored, then never read). The cost is a
          # real download per run; for the one job whose entire purpose is to prove the committed
          # lock file matches the feed, that download IS the gate.
          cache: false

      # Locked restore is the single enforcement point, now via the shared composite
      # action (feature 064) so the --locked-mode enforcement and the regenerate hint
      # live in exactly one place. RestoreLockedMode is also set in Directory.Build.props
      # when GITHUB_ACTIONS=true and a lockfile exists; this forces it explicitly.
      - name: Restore (locked)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.SDD.sln

      # --no-restore: restore already happened above (exactly once). NU1603/NU1608 are
      # promoted to errors in Directory.Build.props.
      - name: Build (net10.0)
        run: dotnet build FS.GG.SDD.sln -c Debug --no-restore

      # The bulk of the suite (Artifacts / Commands / Validation / Contracts / Cli, plus the
      # offline acceptance facts) had no per-PR enforcement — only Contracts.Tests and Cli.Tests
      # ran, and only on release events. Run the whole offline suite here so a red suite blocks
      # the PR (review §5.1).
      #
      # This LOOPS the six test projects via scripts/test.sh (full tier) rather than
      # `dotnet test FS.GG.SDD.sln`. The solution-wide form starts every test host at ONCE and can
      # die of resource exhaustion (`Failed to create CoreCLR, HRESULT: 0x80070008`, or a 90s
      # protocol-negotiation timeout — both misread as a red suite) on a constrained runner; that
      # is the exact hazard scripts/test.sh exists to avoid and DEVELOPING.md warns against, so the
      # gate must not reintroduce it. The `full` tier runs every project UNFILTERED, so it is the
      # gate's peer — the union of the tiers is the whole suite, no test is reachable only under a
      # filter — and sharing one runner keeps the gate from drifting from the local `full` loop.
      # --no-build reuses the artifacts built above; `-c Debug` is passed explicitly (not left to
      # scripts/test.sh's default) so the test config stays locked to the build step's `-c Debug`
      # above and cannot silently diverge if that default ever changes. It is the same Debug config
      # the Commands.Tests CLI smokes auto-detect and invoke. The network-gated composition-acceptance
      # facts self-skip when FSGG_SDD_ACCEPTANCE_REGISTRY is unset, so this stays offline.
      # `--results-dir` emits one TRX per project into a STABLE workspace path (ADR-0035 stage 3b,
      # FS.GG.SDD#511). This is the runner-produced report an SDD work item records an observation
      # receipt FROM (`fsgg-sdd evidence --from-test-report artifacts/test-results/<project>.trx`);
      # before this the census of recorded receipts was structurally stuck at zero, because nothing
      # in the repo emitted a report to record one from. It changes no test, filter, or exit code.
      - name: Test (offline suite)
        id: test
        run: bash scripts/test.sh --no-build -c Debug --results-dir artifacts/test-results

      # Publish the TRX bundle so it outlives the run and a work item's `verify` can cite it.
      # Uploaded whenever the suite actually RAN — a red suite still writes a per-project report,
      # and a failing run is a receipt too (`evidence --from-test-report` blocks on it, ADR-0035),
      # so its report is exactly the one to inspect. Gated on `steps.test.conclusion != 'skipped'`
      # rather than a bare `always()`: if an upstream step (restore/build) fails, Test is skipped and
      # emits nothing, and a bare `always()` upload would then hit `if-no-files-found: error` and add
      # a second, misleading red to an already-red job. `if-no-files-found: error` stays, so the
      # producer silently ceasing to emit reports — the exact regression #511 exists to close — is
      # still loud when the suite DID run.
      - name: Upload test reports (TRX)
        if: ${{ !cancelled() && steps.test.conclusion != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: artifacts/test-results/*.trx
          if-no-files-found: error

      # ADR-0025 detect+classify, for FS.GG.Contracts (#475). Without a committed baseline every
      # `.fsi` is a `missing-baseline` — a *new* surface, which ADR-0025 puts explicitly out of
      # scope — so the shipped-surface-mutation event could never fire here. Measured before this
      # landed: `checkedCount: 59, missing: 59, drifted: 0` ⇒ `classification.verdict: "none"`,
      # entries `[]`. That silence is why #426 (80d0c28) grew the public Contracts surface under an
      # already-published 2.0.0 with nothing red. The reflection `PublicSurface.baseline` test DID
      # see the change (#426 re-captured it, +26 lines) — it just has no opinion about the VERSION,
      # which is the half that was missing.
      #
      # TWO checks, because there are two version axes. Directory.Build.local.props carries the
      # coherent-set <Version> for every FS.GG.SDD.* package; FS.GG.Contracts is the ONE exception
      # and pins its own <Version> in its .fsproj (that file's own comment says so). `versionBump` is
      # a single run-level prompt with a single axis, so one shared axis would name a confidently
      # wrong number — bump Contracts for a CLI change, or the reverse.
      #
      # Both run in ONE step, aggregating exit codes, so a Contracts drift cannot hide a whole-tree
      # drift behind it (one round-trip, not two). Deliberately NOT two steps with `if: always()` on
      # the second: `always()` also fires when the build or the test step FAILED, and `--no-build`
      # would then die with a misleading "you must build first" — a second red pointing at the wrong
      # cause. As one ordinary step it is simply skipped when something upstream is already red.
      #
      # NOTE what this does and does NOT enforce. `--check` blocks (exit 1) on baseline DRIFT. The
      # version half — `surface.versionBumpRequired` — is a WARNING that never changes the exit code,
      # by design (ADR-0025 §2: "advisory-but-loud; the operator confirms"; SDD cannot see the
      # previously published version, so it states an implication, not an accusation). So this gate
      # does not, and cannot, red a PR purely for growing the surface without bumping. What it does
      # is make the growth impossible to land SILENTLY: the baseline must be re-committed, and that
      # commit prints the classification and the exact suggested version in the log.
      - name: API-surface baselines (surface --check — both version axes)
        run: |
          rc=0
          echo '── FS.GG.Contracts (own .fsproj axis) ──'
          dotnet run --project src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj -c Debug --no-build -- \
            surface --check --text \
            --param sourceRoot=src/FS.GG.Contracts \
            --param baselineRoot=docs/api-surface/FS.GG.Contracts \
            --param versionAxisFile=src/FS.GG.Contracts/FS.GG.Contracts.fsproj || rc=1
          echo '── whole tree (FS.GG.SDD.* coherent-set axis) ──'
          dotnet run --project src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj -c Debug --no-build -- \
            surface --check --text \
            --param versionAxisFile=Directory.Build.local.props || rc=1
          exit $rc

      # Feature 105, Phase 2 (ADR-0004 D2): the dependency-surface capture drift-guard. `--check`
      # re-reads each committed `docs/dependency-surface/<Pkg>/<ver>.json` from the package's REAL
      # restored surface and blocks (exit 1) on any digest disagreement; an unreadable surface is
      # advisory, never a false red (ADR-0002 / #266). It relies on the build step above having
      # restored the graph, so the packages are present in the cache.
      #
      # INERT in FS.GG.SDD itself today: this repo references no framework package to capture, so
      # `docs/dependency-surface/` is empty and the check enumerates zero targets (exit 0). The step
      # exists so the guard fires the moment a capture is committed here, and so a consumer product
      # (which DOES reference e.g. FS.GG.UI.*) inherits the identical gate. As one ordinary step it
      # is skipped when something upstream is already red.
      - name: Dependency-surface captures (dependency-surface --check)
        run: |
          dotnet run --project src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj -c Debug --no-build -- \
            dependency-surface --check --text

  build-config-drift:
    name: Shared-build-config drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (SDD)
        uses: actions/checkout@v4

      # Check out FS-GG/.github to run its drift gate directly. `ref: main` is deliberate and
      # required — it pulls two things at head: the current sync-build-config.sh script, and a full
      # object store that necessarily contains the pinned commit as an ancestor of main.
      #
      # `ref: main` is NOT the comparison baseline. Since ADR-0036 / .github#592 the drift check
      # compares the managed files against the commit pinned in .config/fsgg-build-config.sha, not
      # against .github@main — so a change landing in .github can never red-light an open PR here, and
      # the earlier "track main rather than a pin, a pin would become silent drift" rationale (feature
      # 037) is superseded: the pin now IS the baseline, and being behind main is not a failure (the
      # build-config-propagate bot, .github#626, rolls the files and the pin forward together).
      - name: Checkout (FS-GG/.github — shared-build-config source of truth)
        uses: actions/checkout@v4
        with:
          repository: FS-GG/.github
          ref: main
          path: .ci-build-config

      # The managed files (Directory.Build.props, Directory.Packages.props,
      # .config/dotnet-tools.json) MUST be byte-identical to FS-GG/.github dist/dotnet/.
      # A local edit (or a missed re-sync) exits non-zero and fails the PR. Repo-specific
      # settings live in Directory.Build.local.props / Directory.Packages.local.props,
      # which the check ignores.
      - name: Check drift against the org source of truth
        run: |
          set -euo pipefail
          if ! "$GITHUB_WORKSPACE/.ci-build-config/scripts/sync-build-config.sh" --check "$GITHUB_WORKSPACE"; then
            echo "::error::shared-build-config drift — a managed file (Directory.Build.props, Directory.Packages.props, or .config/dotnet-tools.json) diverges from FS-GG/.github dist/dotnet/. Re-sync: scripts/sync-build-config.sh <repo>. Repo-specific settings belong in Directory.Build.local.props / Directory.Packages.local.props."
            exit 1
          fi

  # API compatibility gate (H3 / FS-GG/.github#20, epic FS-GG/.github#16 Pillar 5). Packs
  # FS.GG.Contracts (the SDD-owned cross-repo contract package) and compares it against its
  # published baseline on the org GitHub Packages feed via the .NET SDK's Package Validation /
  # ApiCompat — the F#-viable detector (Microsoft.CodeAnalysis.PublicApiAnalyzers is C#-only). A
  # removed/changed public member is a break that must force a SemVer major (registry coherence id
  # apicompat-publicapi-gate / fsgg-contracts).
  #
  # ENFORCING (ratcheted from advisory, FS-GG/.github#20 resolved): a SEPARATE job whose run FAILS
  # on a real public-API break (Package Validation stays OFF in the normal build/release, so the
  # required `gate`/`build-config-drift` jobs are unaffected).
  # (Branch protection is enabled on `main` (2026-07-09, #287): this job — alongside `gate` and
  # `build-config-drift` — is a REQUIRED status check, so a red run hard-blocks the merge button even
  # for admins (enforce_admins=true). Enforcement is therefore both at the workflow level and at the
  # merge boundary.)
  #
  # FAIL-CLOSED (#381). This comment used to say the script "exits non-zero ONLY on a genuine CP####
  # break — NoBaselineYet / Indeterminate (e.g. a feed hiccup) do not fail it — so this is a robust
  # hard gate, not a flaky one." That was exactly backwards, and it is worth keeping the epitaph:
  #
  #   `Indeterminate` means the pack, the tool, or the feed read FAILED — the API was never compared.
  #   Exiting 0 there does not make the gate robust; it makes it BLIND, and indistinguishable from a
  #   clean run. NU1403 (the pre-ADR-0032 lock bug) made this script's pack fail on EVERY run, so the
  #   gate spent its entire life Indeterminate → exit 0 → `success`, having never once compared an
  #   API, while sitting in the required set. A real removed-constructor break shipped through it.
  #
  # So: BREAK, Indeterminate, and an unallowlisted NoBaselineYet all exit non-zero now. A gate that
  # could not run has not passed. If this job starts failing for an infrastructure reason, FIX THE
  # INFRASTRUCTURE — do not restore the exit 0, and do not drop it from the required set (that is
  # epic FS-GG/.github#266's entire subject).
  #
  # A missing/unusable feed token is likewise a hard failure, not a skip. The old code exited 0
  # "advisory-clean" on no token, reasoning that fork PRs get none — but forks ARE given a
  # GITHUB_TOKEN; it just cannot read the FS-GG feed, so forks fell through the NoBaselineYet hole
  # and were waved through UNVERIFIED. This repo has 0 forks and has taken 0 fork PRs in 212, so
  # nothing real depended on it. If fork PRs ever matter, make it a visible decision here (a
  # conditional `continue-on-error` on `github.event.pull_request.head.repo.fork`), never a silent
  # fallthrough in the script.
  api-compatibility-gate:
    name: API compatibility gate (breaking-change → SemVer major)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          # No restore cache here: this job restores only FS.GG.Contracts (a narrow
          # footprint). setup-dotnet keys the cache solely on hashFiles(packages.lock.json)
          # +OS+runtime — no per-job component — so a partial cache saved here shares the
          # deterministic gate's key and poisons its --locked-mode restore (NU1403, #92).
          # Only the full-solution restore (deterministic gate) caches.

      # Guard the baseline resolver itself (feature 064 / #91): a wrong baseline yields a
      # plausible-looking result, not an obvious error (see #90), so pin the selection.
      - name: Unit-test the baseline resolver
        run: bash scripts/tests/pick-latest-version.test.sh

      # Guard the gate's own verdict logic (#381). Both defects it pins — Indeterminate/NoBaselineYet
      # exiting 0, and the CP#### message truncated before `but not on …` — presented as a GREEN
      # required check, so nothing downstream could have caught them. Neither needs the feed or the
      # SDK to test, which is why they are unit-tested here rather than trusted.
      - name: Unit-test the gate verdict + CP#### rendering
        run: bash scripts/tests/apicompat-check.test.sh

      - name: ApiCompat vs feed baseline
        env:
          NUGET_FEED_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_FEED_USER: ${{ github.actor }}
        run: bash scripts/apicompat-check.sh

  # Format gate (feature 065, US3 of feature 064 / roadmap #85). NON-REQUIRED and
  # advisory: it runs `fantomas --check` over the authored F# tree so a mis-formatted
  # PR shows a red X naming the one command that fixes it, but it must NEVER block the
  # merge. Branch protection on `main` (#287) deliberately does NOT list `format` as a required
  # check, so a failing run stays non-blocking by policy; `format` MUST be kept OUT of the
  # required-checks set (do not add it to any "all checks required" policy) — FR-005.
  #
  # Fantomas is installed PINNED (7.0.5) to a repo-local --tool-path, deliberately WITHOUT
  # touching .config/dotnet-tools.json: that manifest is a managed org file the
  # build-config-drift gate pins byte-identical to FS-GG/.github dist/dotnet/, so adding
  # Fantomas there would fail that gate (feature 065 research Decision 2 / FR-003). The
  # same pinned commands are documented for contributors in DEVELOPING.md so a local
  # verdict matches CI. No solution restore/build here, so (like api-compatibility-gate)
  # this job must NOT cache — a partial cache would poison the deterministic gate's key.
  format:
    name: Format check (fantomas — advisory, non-required)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      # Pinned install to a repo-local path; --allow-roll-forward lets a tool built for an
      # earlier net run on the net10 runtime this SDK ships.
      - name: Install pinned Fantomas (out-of-manifest)
        run: dotnet tool install fantomas --version 7.0.5 --tool-path ./.fantomas-tool --allow-roll-forward

      # `.fantomasignore` scopes this to authored source (no obj/bin/generated .fs). On a
      # non-clean tree fantomas exits non-zero; surface the exact fix command as a GH error.
      - name: Check formatting
        run: |
          if ! ./.fantomas-tool/fantomas --check .; then
            echo "::error::F# formatting drift. Reformat with the pinned formatter, then commit: dotnet tool install fantomas --version 7.0.5 --tool-path ./.fantomas-tool --allow-roll-forward && ./.fantomas-tool/fantomas ."
            exit 1
          fi

  # ── Cross-repo contract-coherence gate ──────────────────────────────────────────────────
  # Adopted per FS-GG/.github#519 (decision: yes, the framework repos call it). The gate lives
  # in FS-GG/.github and is CALLED, never copied — it asserts that the org registry is
  # schema-valid and that its declared `fsgg-contracts` pin equals the ACTUAL FS.GG.Contracts
  # package version. This repo consumes FS.GG.Contracts, so a registry that has drifted from
  # the real package version is this repo's problem, and until now nothing here said so.
  #
  # `check-build-config` is left at its default (true) because registry/repos.yml declares this
  # repo a `build-config` receiver. That DUPLICATES the hand-rolled `build-config-drift` job in
  # this same file, and the duplication is DELIBERATE: that job's `name:` is a REQUIRED status
  # check on main, so deleting it here would leave a required context permanently unreported —
  # a PR that can never merge, which is exactly the silent deadlock FS-GG/.github#574's verifier
  # is being built to catch. Retiring the hand-rolled job must happen in a change that updates
  # this repo's branch protection in the same stroke. Tracked separately; do not "tidy" it away.
  #
  # `packages: read` is MANDATORY for callers: the gate restores the typed fsgg-sdd registry
  # validator from the org GitHub Packages feed using the run-scoped GITHUB_TOKEN.
  contract-coherence:
    uses: FS-GG/.github/.github/workflows/contract-coherence.yml@main
    permissions:
      contents: read
      packages: read
