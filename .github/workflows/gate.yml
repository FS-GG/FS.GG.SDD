name: gate

# Per-PR deterministic gate. The load-bearing enforcement for the FsGgUiVersion-style
# staleness bug class (FS-GG/.github#7, Feature 211 parity): restore in --locked-mode against
# the committed packages.lock.json so any dependency-graph drift, or a silently substituted
# version (NU1603) / out-of-range version (NU1608), fails the build instead of resolving
# quietly. This is separate from composition-acceptance.yml (nightly, network-gated).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Deterministic gate (locked restore + build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          # NuGet restore cache keyed on the committed lockfiles (feature 064): an
          # unchanged dependency set restores from cache; a real lockfile change busts
          # it into a fresh cold restore. Speed only — --locked-mode still enforces.
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      # Locked restore is the single enforcement point, now via the shared composite
      # action (feature 064) so the --locked-mode enforcement and the regenerate hint
      # live in exactly one place. RestoreLockedMode is also set in Directory.Build.props
      # when GITHUB_ACTIONS=true and a lockfile exists; this forces it explicitly.
      - name: Restore (locked)
        uses: ./.github/actions/locked-restore
        with:
          target: FS.GG.SDD.sln

      # --no-restore: restore already happened above (exactly once). NU1603/NU1608 are
      # promoted to errors in Directory.Build.props.
      - name: Build (net10.0)
        run: dotnet build FS.GG.SDD.sln -c Debug --no-restore

      # The bulk of the suite (Artifacts / Commands / Validation / Contracts / Cli, plus the
      # offline acceptance facts) had no per-PR enforcement — only Contracts.Tests and Cli.Tests
      # ran, and only on release events. Run the whole solution offline here so a red suite blocks
      # the PR (review §5.1). --no-build reuses the artifacts built above (same Debug config the
      # Commands.Tests CLI smokes auto-detect and invoke). The network-gated composition-acceptance
      # facts self-skip when FSGG_SDD_ACCEPTANCE_REGISTRY is unset, so this stays offline.
      - name: Test (offline suite)
        run: dotnet test FS.GG.SDD.sln -c Debug --no-build

  build-config-drift:
    name: Shared-build-config drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (SDD)
        uses: actions/checkout@v4

      # No org reusable coherence workflow exists yet (.github#18 is unbuilt), so check
      # out the source of truth and run its drift gate directly. Track main rather than a
      # pinned SHA: a pin would itself become silent drift from the org baseline (feature
      # 037, research Decision 5). Revisit only if upstream churn causes flakiness.
      - name: Checkout (FS-GG/.github — shared-build-config source of truth)
        uses: actions/checkout@v4
        with:
          repository: FS-GG/.github
          ref: main
          path: .ci-build-config

      # The managed files (Directory.Build.props, Directory.Packages.props,
      # .config/dotnet-tools.json) MUST be byte-identical to FS-GG/.github dist/dotnet/.
      # A local edit (or a missed re-sync) exits non-zero and fails the PR. Repo-specific
      # settings live in Directory.Build.local.props / Directory.Packages.local.props,
      # which the check ignores.
      - name: Check drift against the org source of truth
        run: |
          set -euo pipefail
          if ! "$GITHUB_WORKSPACE/.ci-build-config/scripts/sync-build-config.sh" --check "$GITHUB_WORKSPACE"; then
            echo "::error::shared-build-config drift — a managed file (Directory.Build.props, Directory.Packages.props, or .config/dotnet-tools.json) diverges from FS-GG/.github dist/dotnet/. Re-sync: scripts/sync-build-config.sh <repo>. Repo-specific settings belong in Directory.Build.local.props / Directory.Packages.local.props."
            exit 1
          fi

  # API compatibility gate (H3 / FS-GG/.github#20, epic FS-GG/.github#16 Pillar 5). Packs
  # FS.GG.Contracts (the SDD-owned cross-repo contract package) and compares it against its
  # published baseline on the org GitHub Packages feed via the .NET SDK's Package Validation /
  # ApiCompat — the F#-viable detector (Microsoft.CodeAnalysis.PublicApiAnalyzers is C#-only). A
  # removed/changed public member is a break that must force a SemVer major (registry coherence id
  # apicompat-publicapi-gate / fsgg-contracts).
  #
  # ENFORCING (ratcheted from advisory, FS-GG/.github#20 resolved): a SEPARATE job whose run FAILS
  # on a real public-API break (Package Validation stays OFF in the normal build/release, so the
  # required `gate`/`build-config-drift` jobs are unaffected). The detector script exits non-zero
  # ONLY on a genuine CP#### break — NoBaselineYet / Indeterminate (e.g. a feed hiccup) do not fail
  # it — so this is a robust hard gate, not a flaky one. It reads the feed with GITHUB_TOKEN
  # (packages: read); on a fork PR (no token) the script degrades to clean (exit 0) so forks merge.
  # (This repo has no branch protection; enforcement is at the workflow level, the same model as the
  # lockfile-restore gate. Add to branch-protection required checks to also hard-block the merge
  # button if/when the org adopts branch protection.)
  api-compatibility-gate:
    name: API compatibility gate (breaking-change → SemVer major)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          # NuGet restore cache keyed on the committed lockfiles (feature 064): an
          # unchanged dependency set restores from cache; a real lockfile change busts
          # it into a fresh cold restore. Speed only — --locked-mode still enforces.
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: ApiCompat vs feed baseline
        env:
          NUGET_FEED_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_FEED_USER: ${{ github.actor }}
        run: bash scripts/apicompat-check.sh
