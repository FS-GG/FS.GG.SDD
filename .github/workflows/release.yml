name: release

# Producer of the cross-repo auto-update fabric. On a release of FS.GG.SDD (or a pushed
# v* tag, or a manual dispatch), a single run publishes TWO packages to the org GitHub
# Packages feed (nuget.pkg.github.com/FS-GG): FS.GG.Contracts (the org-shared contracts
# line, 1.1.0) and FS.GG.SDD.Cli (the `fsgg-sdd` dotnet tool, the SDD product line, 0.2.0).
# Both push with --skip-duplicate using the run-scoped GITHUB_TOKEN (packages: write, no
# PAT), only from the canonical repo.
#
# THE CONTRACT for triggers + version-resolution + gating + the two-package scope is
# specs/044-publish-cli-tool/contracts/release-workflow.md (it supersedes feature 039's
# single-package producer contract). This YAML is its implementation, not folklore. Each
# package's published version is its EVALUATED fsproj <Version> (msbuild -getProperty); a
# release tag is a coherence check that must match AT LEAST ONE of the two lines, never the
# source (research Decisions 2-3; FR-014 reconciliation).

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit FS.GG.Contracts version to publish. Omit for a pack-only dry run."
        type: string
        required: false

permissions:
  contents: read

# A single tagged release fires BOTH `release: published` and `push: tags v*`. Serialize the
# paired runs (cancel-in-progress: false) keyed on the version/tag so they never push
# simultaneously and no push is cancelled mid-flight; the second run no-ops via
# --skip-duplicate. This is deliberately NOT gate.yml's cancel-in-progress: true PR key.
concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Shared version-resolution state machine — see the contract's version-resolution table.
  # Evaluates BOTH fsproj <Version>s (msbuild -getProperty, not a grep) and applies the
  # at-least-one-line tag guard, then hands contracts_version / cli_version / push to the
  # two publish jobs. Fork events never satisfy the repo guard ⇒ no publish path runs.
  resolve-versions:
    name: Resolve versions (both lines)
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.SDD'
    outputs:
      contracts_version: ${{ steps.ver.outputs.contracts_version }}
      cli_version: ${{ steps.ver.outputs.cli_version }}
      push: ${{ steps.ver.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Source of truth is the EVALUATED fsproj <Version> for each line. The release/tag
      # event's tag is a coherence check against BOTH lines, never the source. A
      # version-bearing tag must match AT LEAST ONE evaluated version (research Decision 2).
      - name: Resolve versions
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          strip_v() { printf '%s' "${1#v}"; }

          contracts_version="$(dotnet msbuild src/FS.GG.Contracts/FS.GG.Contracts.fsproj -getProperty:Version)"
          contracts_version="$(printf '%s' "$contracts_version" | tr -d '[:space:]')"
          cli_version="$(dotnet msbuild src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj -getProperty:Version)"
          cli_version="$(printf '%s' "$cli_version" | tr -d '[:space:]')"

          push=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_VERSION:-}" ]; then
              # Manual override: publish exactly the requested Contracts version; the CLI
              # always tracks its evaluated version (the `version` input is Contracts-scoped).
              contracts_version="$(strip_v "$INPUT_VERSION")"
              if [ -z "$cli_version" ]; then
                echo "::error::could not read <Version> from FS.GG.SDD.Cli.fsproj (build defect)."
                exit 1
              fi
              push="true"
            else
              # Intentional dry run: pack both fsproj versions, push nothing (FR-004).
              if [ -z "$contracts_version" ] || [ -z "$cli_version" ]; then
                echo "::error::could not read <Version> from one of the fsprojs (build defect)."
                exit 1
              fi
              push="false"
              echo "::notice::dry run — packing FS.GG.Contracts $contracts_version and FS.GG.SDD.Cli $cli_version but NOT pushing (manual dispatch with no version input)."
            fi
          else
            # release: published  OR  push: tags v*  — a real publish from the fsproj versions.
            # Unreadable version is a defect: fail, never silently degrade to a dry run (FR-006).
            if [ -z "$contracts_version" ] || [ -z "$cli_version" ]; then
              echo "::error::could not read <Version> from one of the fsprojs on a $EVENT_NAME event (build defect); refusing to silently skip the publish."
              exit 1
            fi

            tag="$RELEASE_TAG"
            [ -z "$tag" ] && tag="$REF_NAME"

            # At-least-one-line guard: a version-bearing tag (v<semver>) must equal the
            # Contracts OR the CLI evaluated version. A non-version-bearing tag is fine — the
            # fsprojs are authoritative. Each package then publishes its own resolved version
            # regardless of which line the tag matched (FR-005; research Decision 2).
            if printf '%s' "$tag" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
              tag_version="$(strip_v "$tag")"
              if [ "$tag_version" != "$contracts_version" ] && [ "$tag_version" != "$cli_version" ]; then
                echo "::error::release tag '$tag' (version $tag_version) matches NEITHER the FS.GG.Contracts fsproj <Version> ($contracts_version) NOR the FS.GG.SDD.Cli fsproj <Version> ($cli_version). The fsprojs are the source of truth; reconcile the tag or a fsproj before releasing."
                exit 1
              fi
            fi

            push="true"
          fi

          echo "contracts_version=$contracts_version" >> "$GITHUB_OUTPUT"
          echo "cli_version=$cli_version" >> "$GITHUB_OUTPUT"
          echo "push=$push" >> "$GITHUB_OUTPUT"
          echo "Resolved: contracts_version=$contracts_version cli_version=$cli_version push=$push (event=$EVENT_NAME)"

  contracts-tests:
    name: Contracts tests (publish gate)
    runs-on: ubuntu-latest
    # Fork events never satisfy this guard ⇒ no publish path runs on a fork (FR-009).
    if: github.repository == 'FS-GG/FS.GG.SDD'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Locked restore, mirroring gate.yml: any dependency-graph drift or silently
      # substituted version (NU1603) fails here instead of resolving quietly.
      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore tests/FS.GG.Contracts.Tests/FS.GG.Contracts.Tests.fsproj --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json (or a version was substituted, NU1603). If this is an intentional dependency change, run: dotnet restore FS.GG.SDD.sln --force-evaluate  and commit the updated packages.lock.json files."
            exit 1
          fi

      # The gate (FR-003): publish-contracts `needs` this job, so a red run never reaches the push.
      - name: Test (FS.GG.Contracts)
        run: dotnet test tests/FS.GG.Contracts.Tests/FS.GG.Contracts.Tests.fsproj -c Release --no-restore

  cli-tests:
    name: CLI tests (publish gate)
    runs-on: ubuntu-latest
    # Fork events never satisfy this guard ⇒ no publish path runs on a fork (FR-009).
    if: github.repository == 'FS-GG/FS.GG.SDD'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Locked restore, mirroring the other jobs (same NU1603 / drift error message).
      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore tests/FS.GG.SDD.Cli.Tests/FS.GG.SDD.Cli.Tests.fsproj --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json (or a version was substituted, NU1603). If this is an intentional dependency change, run: dotnet restore FS.GG.SDD.sln --force-evaluate  and commit the updated packages.lock.json files."
            exit 1
          fi

      # The gate (research Decision 6): publish-cli `needs` this job, so a red run never
      # reaches the push. ValidateCommandTests covers `registry validate` here.
      - name: Test (FS.GG.SDD.Cli)
        run: dotnet test tests/FS.GG.SDD.Cli.Tests/FS.GG.SDD.Cli.Tests.fsproj -c Release --no-restore

  publish-contracts:
    name: Pack + publish FS.GG.Contracts
    needs: [resolve-versions, contracts-tests]
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.SDD'
    # Least-privilege: only this job gains packages: write; the push uses the run-scoped
    # GITHUB_TOKEN, never a PAT (FR-002).
    permissions:
      contents: read
      packages: write
      id-token: write   # ADR-0013: mint the GitHub OIDC token for nuget.org Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore src/FS.GG.Contracts/FS.GG.Contracts.fsproj --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json (or a version was substituted, NU1603). If this is an intentional dependency change, run: dotnet restore FS.GG.SDD.sln --force-evaluate  and commit the updated packages.lock.json files."
            exit 1
          fi

      # Single explicit project ⇒ single-package scope (FR-001). --no-restore reuses the
      # locked restore above. Version comes from the shared resolve-versions job (FR-014 —
      # the only Contracts delta is the relaxed cross-line tag guard).
      - name: Pack
        run: |
          set -euo pipefail
          dotnet pack src/FS.GG.Contracts/FS.GG.Contracts.fsproj -c Release \
            -p:Version=${{ needs.resolve-versions.outputs.contracts_version }} --no-restore -o artifacts/packages

      # A green test plus an empty pack MUST NOT report success (FR-007): fail loudly if
      # nothing was packed.
      - name: Assert a package was produced
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(artifacts/packages/*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::pack produced no .nupkg — the tests passed but there is nothing to publish."
            exit 1
          fi
          printf 'Packed: %s\n' "${packages[@]}"

      # Push only when push==true (a dry run skips this entirely, FR-004). --skip-duplicate
      # makes a re-publish of an existing version an idempotent no-op success (FR-008); any
      # other push failure fails the run (FR-012).
      - name: Push to the org feed
        if: needs.resolve-versions.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      # Dual-publish the BYTE-IDENTICAL gate-verified .nupkg to public nuget.org (ADR-0012 §1–§5)
      # via Trusted Publishing / OIDC (ADR-0013 — no stored key). Runs AFTER the org-feed push
      # (gated ordering, ADR-0012 §4): if that step fails the job stops before this one. NuGet/login
      # mints a single-use key from the org's Trusted Publishing policy (fs-gg-sdd-release); until the
      # policy exists it 401s and fails the release loud.
      - name: NuGet login (OIDC → short-lived nuget.org key)
        if: needs.resolve-versions.outputs.push == 'true'
        id: nuget-login-contracts
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || 'Paradigma11' }}
      - name: Push to nuget.org (public)
        if: needs.resolve-versions.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-login-contracts.outputs.NUGET_API_KEY }} \
            --skip-duplicate

  publish-cli:
    name: Pack + publish FS.GG.SDD.Cli (fsgg-sdd tool)
    needs: [resolve-versions, cli-tests]
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.SDD'
    # Least-privilege: only this job gains packages: write; the push uses the run-scoped
    # GITHUB_TOKEN, never a PAT (FR-002).
    permissions:
      contents: read
      packages: write
      id-token: write   # ADR-0013: mint the GitHub OIDC token for nuget.org Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json (or a version was substituted, NU1603). If this is an intentional dependency change, run: dotnet restore FS.GG.SDD.sln --force-evaluate  and commit the updated packages.lock.json files."
            exit 1
          fi

      # The CLI is already PackAsTool/ToolCommandName=fsgg-sdd; `dotnet pack` bundles its full
      # runtime closure (the RegistryDocument YAML loader + YamlDotNet) so the installed tool
      # runs `registry validate` standalone (FR-010, self-containment). Single explicit project
      # ⇒ single-package scope (FR-001). Version from the shared resolve-versions job.
      - name: Pack
        run: |
          set -euo pipefail
          dotnet pack src/FS.GG.SDD.Cli/FS.GG.SDD.Cli.fsproj -c Release \
            -p:Version=${{ needs.resolve-versions.outputs.cli_version }} --no-restore -o artifacts/packages

      # A green test plus an empty pack MUST NOT report success (FR-007): fail loudly if the
      # expected tool package was not produced.
      - name: Assert the tool package was produced
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(artifacts/packages/FS.GG.SDD.Cli.*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::pack produced no FS.GG.SDD.Cli.*.nupkg — the tests passed but there is no tool package to publish."
            exit 1
          fi
          printf 'Packed: %s\n' "${packages[@]}"

      # Push only when push==true (a dry run skips this entirely, FR-004). --skip-duplicate
      # makes a re-publish of an existing version an idempotent no-op success (FR-008); any
      # other push failure fails the run (FR-012).
      - name: Push to the org feed
        if: needs.resolve-versions.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.SDD.Cli.*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      # Dual-publish the byte-identical tool package to public nuget.org via Trusted Publishing (OIDC)
      # — see the contracts job for the ordering/policy rationale (ADR-0012 §4 / ADR-0013).
      - name: NuGet login (OIDC → short-lived nuget.org key)
        if: needs.resolve-versions.outputs.push == 'true'
        id: nuget-login-cli
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || 'Paradigma11' }}
      - name: Push to nuget.org (public)
        if: needs.resolve-versions.outputs.push == 'true'
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/FS.GG.SDD.Cli.*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-login-cli.outputs.NUGET_API_KEY }} \
            --skip-duplicate
