principleIV: applicable
principleIVNote: >-
  ValidationHarness is a pure Elmish Model/Msg/Effect surface: init enumerates the
  declared cross-product into pending cells and emits effects; update folds
  CellEvaluated/SurfaceReconciled; BuildReport projects the report. ValidationRunner
  is the edge interpreter performing all real I/O (drive CommandWorkflow, read
  artifacts, ReleaseContract.evaluate, coverage reconciliation), reusing the Commands
  effect interpreter. Pure-fold tests + real-interpreter evidence above.
syntheticEvidence: >-
  RunnerOptions.InjectedDivergences is a documented harness self-test seam used only
  by LifecycleMatrixTests to prove single-cell failure isolation + diagnostic shape;
  it is empty on every real run. Genuine divergence detection is exercised over real
  artifacts by the baseline matrix (ReleaseContract.evaluate drift) and the coverage
  matrix (independent real-surface reconciliation).
