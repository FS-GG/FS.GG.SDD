# A complete, valid `evidence.yml` you can copy-adapt. Validated on every build by
# the live evidence parser (ExampleArtifactsContractTests) AND driven end-to-end
# through the real generating + gating stages plan -> tasks -> analyze -> evidence ->
# verify -> ship (ExampleLifecycleContractTests). Because `tasks` re-derives the task
# graph on every run (one obligation per required disposition), this file declares one
# evidence entry per generated obligation EV001..EV008 — so the example is a genuine
# FIXPOINT of the tool that produces it (#211): running the generators over it leaves a
# graph its own evidence still satisfies.
#
# The satisfaction rule: an obligation is satisfied ONLY by a matching declaration with
# `result: pass` AND `synthetic: false` — a synthetic pass or a deferral does not satisfy
# it. See [[fs-gg-sdd-evidence]] and docs/reference/authoring-contracts.md.
#
# A declaration matches an obligation by `id` (EV### == the task's `requiredEvidence`
# id); the same declaration clears both the evidence gate (ED-###) and the verify test
# gate (TD-###). `subject` names the task the obligation hangs off, for readability.
#
# Auto-scaffolded obligations already carry their originating `requirementRefs` and
# `planDecisionRefs`, routed from the task's source lineage, so you can classify each
# obligation without joining back to tasks.yml by title. You may add the other ref
# fields (clarificationDecisionRefs / acceptanceScenarioRefs / …) by hand, as below.
#
# A DEFERRAL (result: deferred, or kind: deferral) is a first-class, accepted outcome —
# NOT a failure and NOT a synthetic pass. The evidence gate REQUIRES every deferral to
# carry all four fields — `rationale`, `owner`, `scope`, `laterLifecycleVisibility` —
# or it blocks with `evidence.missingDeferralRationale`. EV008 below is the canonical
# deferral shape (matched by SkillGateDoctestTests against the deferral gate rule).
schemaVersion: 1
evidence:
  # Satisfies EV001 (T001, requirement FR-001): real (non-synthetic) verification that passed.
  # T001 also disposes PD-001: the plan scaffold derives one PD per FR mirroring that FR's own
  # refs, so `tasks` folds the PD id into the requirement task rather than deriving a duplicate
  # task over the identical FR/AC set.
  - id: EV001
    kind: verification
    subject:
      type: task
      id: T001
    requirementRefs: [FR-001]
    acceptanceScenarioRefs: [AC-001]
    planDecisionRefs: [PD-001]
    artifacts: [tests/ExampleApp.Tests/ServeRuleTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV002 (T002, requirement FR-002), and disposes PD-002 the same way.
  - id: EV002
    kind: verification
    subject:
      type: task
      id: T002
    requirementRefs: [FR-002]
    acceptanceScenarioRefs: [AC-002]
    planDecisionRefs: [PD-002]
    artifacts: [tests/ExampleApp.Tests/RallyScoreTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV003 (T003, clarification decision DEC-001).
  - id: EV003
    kind: verification
    subject:
      type: task
      id: T003
    clarificationDecisionRefs: [DEC-001]
    artifacts: [tests/ExampleApp.Tests/ServeRuleTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV004 (T004, contract surface PC-001).
  - id: EV004
    kind: verification
    subject:
      type: task
      id: T004
    planDecisionRefs: [PD-001]
    artifacts: [tests/ExampleApp.Tests/CommandReportContractTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV005 (T005, verification obligation VO-001).
  - id: EV005
    kind: verification
    subject:
      type: task
      id: T005
    planDecisionRefs: [PD-001]
    artifacts: [tests/ExampleApp.Tests/CommandSmokeTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV006 (T006, migration posture PM-001).
  - id: EV006
    kind: verification
    subject:
      type: task
      id: T006
    artifacts: [tests/ExampleApp.Tests/SchemaVersionTests.fs]
    result: pass
    synthetic: false
  # Satisfies EV007 (T007, generated-view impact GV-001).
  - id: EV007
    kind: verification
    subject:
      type: task
      id: T007
    planDecisionRefs: [PD-001]
    artifacts: [tests/ExampleApp.Tests/WorkModelViewTests.fs]
    result: pass
    synthetic: false
  # An accepted DEFERRAL — the match-end/win condition (DEC-002) is out of scope for this work
  # item; T008 keeps that ONE deferral visible. Everything that merely echoes DEC-002 folds into
  # this single keep-visible obligation rather than fanning out into three more (#646):
  #   * PD-003 — the plan scaffold's PURE deferral mirror for DEC-002 (#649);
  #   * CR-003 — the checklist scaffold's PURE deferral echo of DEC-002 (`acceptedDeferral: …
  #     remains visible to planning.`), which keeps visible nothing this task does not;
  #   * PD-004 — the plan's pure mirror OF that CR-003 echo, folded transitively.
  # So one accepted deferral yields ONE keep-visible obligation, not four — hence the folded refs
  # below. All four deferral fields are present, so the gate accepts it. Satisfies EV008.
  - id: EV008
    kind: deferral
    subject:
      type: task
      id: T008
    requirementRefs: [FR-002]
    clarificationDecisionRefs: [DEC-002]
    checklistResultRefs: [CR-003]
    planDecisionRefs: [PD-003, PD-004]
    result: deferred
    synthetic: false
    rationale: A match-end/win condition is out of scope for this work item; rally scoring ships without it.
    owner: codex
    scope: match-end condition and win detection
    laterLifecycleVisibility: Re-open as a follow-on work item when match play is specified.
